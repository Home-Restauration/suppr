services:
  - type: web
    name: suppr-api
    env: node
    rootDir: apps/api
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: suppr-web
    env: node
    rootDir: apps/web
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: suppr-bot
    env: node
    rootDir: apps/bot
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production

  - type: worker
    name: suppr-queue-worker
    env: node
    rootDir: apps/api
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/workers/queue-consumer.js
