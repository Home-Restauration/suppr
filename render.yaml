services:
  - type: web
    name: suppr-api
    runtime: node
    region: oregon
    plan: starter
    branch: main
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @suppr/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

  - type: web
    name: suppr-bot
    runtime: node
    region: oregon
    plan: starter
    branch: main
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @suppr/bot build
    startCommand: node apps/bot/dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3002"

  - type: web
    name: suppr-web
    runtime: node
    region: oregon
    plan: starter
    branch: main
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @suppr/web build
    startCommand: cd apps/web && pnpm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

  - type: worker
    name: suppr-queue-worker
    runtime: node
    region: oregon
    plan: starter
    branch: main
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @suppr/api build
    startCommand: node apps/api/dist/workers/queue-consumer.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
